<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>陶芸記録</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="kicker">Ceramic Archive</p>
            <h1>陶芸記録</h1>
          </div>
          <div class="summary" aria-label="記録サマリー">
            <div>
              <span id="totalCount">0</span>
              <small>作品</small>
            </div>
            <div>
              <span id="activeCount">0</span>
              <small>制作中</small>
            </div>
            <div>
              <span id="finishedCount">0</span>
              <small>完成</small>
            </div>
          </div>
        </header>

        <section class="entry-panel" aria-labelledby="formTitle">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Start with photo</p>
              <h2 id="formTitle">新しい作品</h2>
            </div>
            <button class="ghost-button" type="button" id="resetButton">リセット</button>
          </div>

          <form id="recordForm" autocomplete="off">
            <input type="hidden" id="editingId">
            <div class="photo-field">
              <div>
                <span class="field-label">写真</span>
                <p>撮った写真を選んでから、作品情報を残します。</p>
              </div>
              <div class="photo-controls">
                <label class="photo-picker">
                  写真を選ぶ
                  <input id="photoInput" name="photoInput" type="file" accept="image/*">
                </label>
                <button class="ghost-button" type="button" id="removePhotoButton">写真を外す</button>
              </div>
              <div class="photo-preview" id="photoPreview" aria-label="選択中の写真プレビュー">
                <span>写真なし</span>
              </div>
            </div>
            <div class="form-grid">
              <label class="wide-field">
                作品名
                <input id="title" name="title" required placeholder="例: 粉引きの飯碗">
              </label>
              <label>
                制作日
                <input id="madeAt" name="madeAt" type="date" required>
              </label>
              <label>
                工程
                <select id="stage" name="stage">
                  <option>成形</option>
                  <option>削り</option>
                  <option>乾燥</option>
                  <option>素焼き</option>
                  <option>釉掛け</option>
                  <option>本焼き</option>
                  <option>完成</option>
                </select>
              </label>
              <label>
                土
                <input id="clay" name="clay" placeholder="例: 信楽白土">
              </label>
              <label>
                釉薬
                <input id="glaze" name="glaze" placeholder="例: 灰釉、透明釉">
              </label>
              <label>
                焼成
                <input id="firing" name="firing" placeholder="例: 酸化 1230度">
              </label>
              <label>
                サイズ
                <input id="size" name="size" placeholder="例: 直径12cm 高さ6cm">
              </label>
            </div>
            <label class="notes-field">
              メモ
              <textarea id="notes" name="notes" rows="4" placeholder="手触り、反省点、次回試したいことなど"></textarea>
            </label>
            <div class="form-actions">
              <button class="primary-button" type="submit" id="saveButton">記録する</button>
            </div>
          </form>
        </section>
      </section>

      <section class="library" aria-label="作品一覧">
        <div class="toolbar">
          <label class="search-box">
            検索
            <input id="searchInput" placeholder="作品名・土・釉薬・メモ">
          </label>
          <label class="stage-filter">
            工程
            <select id="stageFilter">
              <option value="all">すべて</option>
              <option>成形</option>
              <option>削り</option>
              <option>乾燥</option>
              <option>素焼き</option>
              <option>釉掛け</option>
              <option>本焼き</option>
              <option>完成</option>
            </select>
          </label>
        </div>
        <div id="recordList" class="record-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="recordTemplate">
      <article class="record-card">
        <div class="record-image"></div>
        <div class="record-body">
          <div class="record-head">
            <div>
              <p class="record-date"></p>
              <h3></h3>
            </div>
            <span class="stage-pill"></span>
          </div>
          <dl class="record-details"></dl>
          <p class="record-notes"></p>
          <div class="card-actions">
            <button type="button" class="edit-button">編集</button>
            <button type="button" class="delete-button">削除</button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
